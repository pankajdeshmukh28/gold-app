name: Fetch gold prices

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/fetch-prices.yml"

concurrency:
  group: fetch-prices
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch_prices.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COSTCO_PRODUCT_URL: ${{ vars.COSTCO_PRODUCT_URL }}
          COSTCO_SKU_GRAMS: ${{ vars.COSTCO_SKU_GRAMS }}
          JMBULLION_CATEGORY_URL: ${{ vars.JMBULLION_CATEGORY_URL }}
          US_RETAIL_PREMIUM_RATE: ${{ vars.US_RETAIL_PREMIUM_RATE }}
          INDIA_GST_RATE: ${{ vars.INDIA_GST_RATE }}
          PRICE_DROP_THRESHOLD_PCT: ${{ vars.PRICE_DROP_THRESHOLD_PCT }}
        run: python -m scripts.fetch_prices

      - name: Commit data changes
        run: |
          git config user.name "gold-app-bot"
          git config user.email "gold-app-bot@users.noreply.github.com"
          git add docs/data.json docs/state.json docs/history.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): refresh at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
