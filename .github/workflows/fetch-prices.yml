name: Fetch gold prices

on:
  schedule:
    - cron: "17 */2 * * *"
  workflow_dispatch:
    inputs:
      test_notify:
        description: "Send a test Telegram message and exit (verifies bot setup)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/fetch-prices.yml"

concurrency:
  group: fetch-prices
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Telegram secrets present
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "::warning::TELEGRAM_BOT_TOKEN secret is EMPTY in this run."
          else
            echo "TELEGRAM_BOT_TOKEN: present (len=${#TELEGRAM_BOT_TOKEN})"
          fi
          if [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "::warning::TELEGRAM_CHAT_ID secret is EMPTY in this run."
          else
            echo "TELEGRAM_CHAT_ID: present (len=${#TELEGRAM_CHAT_ID})"
          fi

      - name: Run fetch_prices.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ADMIN_CHAT_IDS: ${{ vars.ADMIN_CHAT_IDS }}
          TEST_NOTIFY: ${{ inputs.test_notify }}
          COSTCO_PRODUCT_URL: ${{ vars.COSTCO_PRODUCT_URL }}
          COSTCO_SKU_GRAMS: ${{ vars.COSTCO_SKU_GRAMS }}
          JMBULLION_CATEGORY_URL: ${{ vars.JMBULLION_CATEGORY_URL }}
          US_RETAIL_PREMIUM_RATE: ${{ vars.US_RETAIL_PREMIUM_RATE }}
          US_SALES_TAX_RATE: ${{ vars.US_SALES_TAX_RATE }}
          INDIA_GST_RATE: ${{ vars.INDIA_GST_RATE }}
          SAVINGS_INCREASE_THRESHOLD_INR: ${{ vars.SAVINGS_INCREASE_THRESHOLD_INR }}
        run: python -m scripts.fetch_prices

      - name: Commit data changes
        run: |
          git config user.name "gold-app-bot"
          git config user.email "gold-app-bot@users.noreply.github.com"
          # subscribers.json may be written by BroadcastNotifier when it
          # auto-prunes chats that blocked the bot — include it.
          git add docs/data.json docs/state.json docs/history.json docs/subscribers.json
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): refresh at $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            for i in 1 2 3; do
              git pull --rebase --autostash && git push && break || sleep $((i * 5))
            done
          fi
