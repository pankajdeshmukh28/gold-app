<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gold" />
  <title>Gold — US vs India</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><defs><radialGradient id='g' cx='40%25' cy='35%25'><stop offset='0%25' stop-color='%23FFE580'/><stop offset='55%25' stop-color='%23F4BE40'/><stop offset='100%25' stop-color='%23B8860B'/></radialGradient></defs><circle cx='12' cy='12' r='10.5' fill='url(%23g)' stroke='%238B6508' stroke-width='0.6'/><circle cx='12' cy='12' r='8' fill='none' stroke='%238B6508' stroke-width='0.5' opacity='0.55'/><text x='12' y='16.5' text-anchor='middle' font-family='-apple-system, system-ui, sans-serif' font-weight='800' font-size='12' fill='%236B4A00'>%E2%82%B9</text></svg>" />
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><defs><radialGradient id='g' cx='40%25' cy='35%25'><stop offset='0%25' stop-color='%23FFE580'/><stop offset='55%25' stop-color='%23F4BE40'/><stop offset='100%25' stop-color='%23B8860B'/></radialGradient></defs><rect width='180' height='180' rx='38' fill='%230b0b0c'/><circle cx='90' cy='90' r='68' fill='url(%23g)' stroke='%238B6508' stroke-width='4'/><circle cx='90' cy='90' r='52' fill='none' stroke='%238B6508' stroke-width='3' opacity='0.55'/><text x='90' y='116' text-anchor='middle' font-family='-apple-system, system-ui, sans-serif' font-weight='800' font-size='86' fill='%236B4A00'>%E2%82%B9</text></svg>" />
  <style>
    :root {
      --bg: #0b0b0c;
      --surface: #17171a;
      --surface-2: #222226;
      --fg: #f2f2f2;
      --muted: #8a8a91;
      --accent-green: #22c55e;
      --accent-red: #ef4444;
      --accent-amber: #f59e0b;
      --border: #2a2a2f;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      background: var(--bg); color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .container {
      max-width: 520px;
      margin: 0 auto;
      padding: max(16px, env(safe-area-inset-top)) 16px calc(24px + env(safe-area-inset-bottom));
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 20px; margin: 0; font-weight: 600; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 8px;
    }
    svg.coin {
      width: 24px; height: 24px; display: block;
      filter: drop-shadow(0 1px 2px rgba(244, 190, 64, 0.25));
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent-green);
      box-shadow: 0 0 8px var(--accent-green);
    }
    .dot.stale { background: var(--accent-amber); box-shadow: 0 0 8px var(--accent-amber); }
    .dot.error { background: var(--accent-red); box-shadow: 0 0 8px var(--accent-red); }
    .verdict-card {
      background: linear-gradient(180deg, var(--surface), var(--surface-2));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 20px;
      text-align: center;
      margin-bottom: 16px;
    }
    .verdict-label {
      font-size: 12px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .verdict-big {
      font-size: 15px; font-weight: 500; color: var(--muted);
      margin-bottom: 4px;
    }
    .savings-hero {
      font-size: 54px; font-weight: 700; letter-spacing: -0.04em;
      line-height: 1;
      margin: 10px 0 2px;
      font-variant-numeric: tabular-nums;
    }
    .savings-hero.buy-us { color: var(--accent-green); }
    .savings-hero.buy-in { color: var(--accent-red); }
    .savings-hero.neutral { color: var(--muted); font-size: 22px; letter-spacing: -0.01em; }
    .savings-unit {
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.14em;
      margin-bottom: 8px;
    }
    .savings-meta {
      font-size: 13px; font-weight: 500;
      color: var(--fg); opacity: 0.85;
      font-variant-numeric: tabular-nums;
      margin-top: 2px;
    }
    .savings-meta .pct { color: var(--muted); }
    .savings-meta:empty { display: none; }
    .verdict-sub {
      font-size: 12px; color: var(--muted); margin-top: 12px;
      line-height: 1.4;
    }
    .grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 16px;
    }
    .cell {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
    }
    .cell .label {
      font-size: 11px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .cell .val {
      font-size: 20px; font-weight: 600; letter-spacing: -0.02em;
    }
    .cell .sub {
      font-size: 11px; color: var(--muted); margin-top: 4px;
    }
    .pill {
      display: inline-block;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 2px 6px;
      margin-left: 6px;
      background: #1d3b23;
      color: #86efac;
      border-radius: 999px;
      vertical-align: middle;
    }
    .pill-amber { background: #3a2a10; color: #fbbf24; }
    .costco-card {
      margin-bottom: 16px;
      padding: 16px;
      border-left: 3px solid #e31837;
    }
    .costco-header {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 12px; margin-bottom: 10px;
    }
    .costco-label { font-weight: 600; color: var(--fg); letter-spacing: 0.02em; }
    .costco-ago { color: var(--muted); font-size: 11px; }
    .costco-row {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 8px;
    }
    .costco-val {
      font-size: 22px; font-weight: 600; letter-spacing: -0.02em;
    }
    .costco-val-inr { color: var(--muted); font-size: 14px; }
    .costco-foot {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--muted); padding-top: 8px;
      border-top: 1px solid var(--border);
    }
    .costco-foot a { color: var(--accent-amber); text-decoration: none; }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .chart-title {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 12px; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      margin-bottom: 10px;
    }
    svg.spark {
      width: 100%; height: 80px; display: block;
    }
    .details {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 16px;
    }
    .details .row {
      display: flex; justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .details .row:last-child { border-bottom: none; }
    .details .row .k { color: var(--muted); }
    .details .row .v { color: var(--fg); font-variant-numeric: tabular-nums; }
    footer {
      text-align: center;
      color: var(--muted);
      font-size: 11px;
      margin-top: 20px;
    }
    footer a { color: var(--muted); text-decoration: underline; }
    .error-banner {
      background: #2a0f12;
      border: 1px solid #5c1d24;
      color: #fca5a5;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }
    .notes-banner {
      background: #2a1f0a;
      border: 1px solid #5a4014;
      color: #fbbf24;
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>
        <svg class="coin" viewBox="0 0 24 24" aria-hidden="true">
          <defs>
            <radialGradient id="coinGrad" cx="40%" cy="35%">
              <stop offset="0%" stop-color="#FFE580" />
              <stop offset="55%" stop-color="#F4BE40" />
              <stop offset="100%" stop-color="#B8860B" />
            </radialGradient>
          </defs>
          <circle cx="12" cy="12" r="10.5" fill="url(#coinGrad)" stroke="#8B6508" stroke-width="0.6" />
          <circle cx="12" cy="12" r="8" fill="none" stroke="#8B6508" stroke-width="0.5" opacity="0.55" />
          <text x="12" y="16.5" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-weight="800" font-size="12" fill="#6B4A00">₹</text>
        </svg>
        Gold: US vs India
      </h1>
      <span id="status-dot" class="dot" title="ok"></span>
    </header>

    <div id="error-banner" class="error-banner" style="display:none;"></div>
    <div id="notes-banner" class="notes-banner" style="display:none;"></div>

    <div class="verdict-card">
      <div class="verdict-label">Verdict</div>
      <div class="verdict-big" id="verdict-big">—</div>
      <div class="savings-hero" id="savings-hero">—</div>
      <div class="savings-unit" id="savings-unit">per 10g</div>
      <div class="savings-meta" id="savings-meta">—</div>
      <div class="verdict-sub" id="verdict-sub">—</div>
    </div>

    <div class="grid">
      <div class="cell">
        <div class="label">US per 10g <span class="pill">all-in</span></div>
        <div class="val" id="us-per-10g">—</div>
        <div class="sub" id="us-per-10g-inr">—</div>
        <div class="sub" id="us-sub">—</div>
      </div>
      <div class="cell">
        <div class="label">India per 10g <span class="pill">all-in</span></div>
        <div class="val" id="in-per-10g">—</div>
        <div class="sub" id="in-per-10g-usd">—</div>
        <div class="sub">incl. 3% GST</div>
      </div>
    </div>

    <div id="costco-card" class="cell costco-card" style="display:none;">
      <div class="costco-header">
        <span class="costco-label">🏬 Costco <span id="costco-stale-pill" class="pill pill-amber" style="display:none;">stale</span></span>
        <span id="costco-ago" class="costco-ago">—</span>
      </div>
      <div class="costco-row">
        <div class="costco-val" id="costco-usd-10g">—</div>
        <div class="costco-val-inr" id="costco-inr-10g">—</div>
      </div>
      <div class="costco-foot">
        <span id="costco-vs-retail">—</span>
        <a id="costco-link" href="#" target="_blank" rel="noopener">view →</a>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title">
        <span>Delta % — recent history</span>
        <span id="chart-range">—</span>
      </div>
      <svg id="spark" class="spark" viewBox="0 0 300 80" preserveAspectRatio="none"></svg>
    </div>

    <div class="details">
      <div class="row"><span class="k">Spot gold</span><span class="v" id="spot">—</span></div>
      <div class="row"><span class="k">USD → INR</span><span class="v" id="fx">—</span></div>
      <div class="row"><span class="k">US bar price</span><span class="v" id="us-price">—</span></div>
      <div class="row"><span class="k">SKU size</span><span class="v" id="us-grams">—</span></div>
      <div class="row"><span class="k">Last check</span><span class="v" id="ts">—</span></div>
    </div>

    <footer>
      Directional only, not financial advice. Data updates every few hours.<br/>
      <a id="src-link" target="_blank" rel="noopener">source</a>
    </footer>
  </div>

  <script>
    const fmt$ = (n) => n == null ? '—' : '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const fmtShort$ = (n) => n == null ? '—' : '$' + Number(n).toLocaleString('en-US', { maximumFractionDigits: 2 });
    const fmtINR = (n) => n == null ? '—' : '₹' + Number(n).toLocaleString('en-IN', { maximumFractionDigits: 0 });
    const fmtNum = (n, d = 2) => n == null ? '—' : Number(n).toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d });
    const fmtPct = (n) => n == null ? '—' : (n > 0 ? '+' : '') + Number(n).toFixed(2) + '%';

    function relTime(iso) {
      if (!iso) return '—';
      const then = new Date(iso).getTime();
      const diff = (Date.now() - then) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      return Math.floor(diff / 86400) + 'd ago';
    }

    function setStatus(state, title) {
      const d = document.getElementById('status-dot');
      d.className = 'dot ' + state;
      d.title = title || state;
    }

    function renderSpark(history) {
      const svg = document.getElementById('spark');
      svg.innerHTML = '';
      if (!history || history.length < 2) {
        document.getElementById('chart-range').textContent = 'not enough data yet';
        return;
      }
      const values = history.map(h => h.delta);
      const min = Math.min(...values, 0);
      const max = Math.max(...values, 0);
      const span = (max - min) || 1;
      const w = 300, h = 80, pad = 4;
      const step = (w - 2 * pad) / (history.length - 1);

      const y = v => h - pad - ((v - min) / span) * (h - 2 * pad);
      const zeroY = y(0);

      const pts = history.map((d, i) => [pad + i * step, y(d.delta)]);
      const d = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');

      const zeroLine = `<line x1="${pad}" y1="${zeroY.toFixed(1)}" x2="${w - pad}" y2="${zeroY.toFixed(1)}" stroke="#2a2a2f" stroke-dasharray="3 3" />`;
      const fill = `<path d="${d} L${pts[pts.length-1][0].toFixed(1)},${zeroY.toFixed(1)} L${pts[0][0].toFixed(1)},${zeroY.toFixed(1)} Z" fill="rgba(245, 158, 11, 0.08)" />`;
      const stroke = `<path d="${d}" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;

      const lastX = pts[pts.length - 1][0], lastY = pts[pts.length - 1][1];
      const dot = `<circle cx="${lastX.toFixed(1)}" cy="${lastY.toFixed(1)}" r="3" fill="#f59e0b"/>`;

      svg.innerHTML = zeroLine + fill + stroke + dot;

      const from = new Date(history[0].t);
      document.getElementById('chart-range').textContent =
        history.length + ' pts · ' + relTime(history[0].t).replace(' ago', '') + ' → now';
    }

    async function loadCostco(mainInputs, mainVerdict) {
      const card = document.getElementById('costco-card');
      try {
        const r = await fetch('costco.json?_=' + Date.now());
        if (!r.ok) { card.style.display = 'none'; return; }
        const c = await r.json();
        if (!c || !c.price_usd || !c.timestamp) { card.style.display = 'none'; return; }

        const ageMs = Date.now() - new Date(c.timestamp).getTime();
        const FRESH_CUTOFF_MS = 1000 * 60 * 60 * 24;
        if (ageMs > FRESH_CUTOFF_MS * 3) {
          card.style.display = 'none';
          return;
        }

        card.style.display = 'block';
        document.getElementById('costco-ago').textContent = 'updated ' + relTime(c.timestamp);

        const stalePill = document.getElementById('costco-stale-pill');
        stalePill.style.display = ageMs > FRESH_CUTOFF_MS ? 'inline-block' : 'none';

        const usdPer10g = c.usd_per_10g != null ? c.usd_per_10g : (c.price_usd / c.grams * 10);
        const inrPer10g = (mainInputs && mainInputs.usd_inr) ? usdPer10g * mainInputs.usd_inr : null;
        document.getElementById('costco-usd-10g').textContent = fmt$(usdPer10g) + ' / 10g';
        document.getElementById('costco-inr-10g').textContent = inrPer10g != null ? '≈ ' + fmtINR(inrPer10g) : '';

        const retailUsdPer10g = mainVerdict && mainVerdict.us_usd_per_10g;
        if (retailUsdPer10g) {
          const diff = ((usdPer10g - retailUsdPer10g) / retailUsdPer10g) * 100;
          const verb = diff < 0 ? 'cheaper' : 'pricier';
          document.getElementById('costco-vs-retail').textContent =
            Math.abs(diff).toFixed(2) + '% ' + verb + ' than ' + (mainInputs.us_source || 'retail').toUpperCase();
        } else {
          document.getElementById('costco-vs-retail').textContent = '';
        }

        const link = document.getElementById('costco-link');
        link.href = c.url || '#';
      } catch (_) {
        card.style.display = 'none';
      }
    }

    async function load() {
      try {
        const r = await fetch('data.json?_=' + Date.now());
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const data = await r.json();

        if (data.status === 'error') {
          setStatus('error', 'fetch errors');
          const eb = document.getElementById('error-banner');
          eb.style.display = 'block';
          eb.textContent = 'Last run failed: ' + (data.errors || []).join('; ');
          return;
        }

        const stale = (Date.now() - new Date(data.timestamp).getTime()) > 1000 * 60 * 60 * 12;
        setStatus(stale ? 'stale' : '', stale ? 'data is over 12h old' : 'ok');

        const v = data.verdict || {};
        document.getElementById('verdict-big').textContent =
          v.verdict === 'BUY_IN_US' ? 'Cheaper in the US' :
          v.verdict === 'BUY_IN_INDIA' ? 'Cheaper in India' :
          v.verdict === 'NEUTRAL' ? 'Roughly equivalent' : '—';

        const dp = v.delta_pct;
        const cls = dp < -0.1 ? 'buy-us' : dp > 0.1 ? 'buy-in' : 'neutral';

        const heroEl = document.getElementById('savings-hero');
        const unitEl = document.getElementById('savings-unit');
        const metaEl = document.getElementById('savings-meta');
        const subEl = document.getElementById('verdict-sub');

        heroEl.className = 'savings-hero ' + cls;

        if (cls === 'neutral' || v.abs_diff_inr_per_10g == null) {
          heroEl.textContent = 'No meaningful gap';
          unitEl.textContent = '';
          metaEl.textContent = '';
          subEl.textContent = 'US and India are within ±0.1% right now.';
        } else {
          heroEl.textContent = fmtINR(v.abs_diff_inr_per_10g);
          unitEl.textContent = 'saved per 10g';
          metaEl.innerHTML =
            '≈ ' + fmt$(v.abs_diff_usd_per_10g) +
            ' <span class="pct">· ' + fmtPct(dp) + '</span>';
          subEl.textContent = cls === 'buy-us'
            ? 'if you buy in the US instead of India · per 10g · all-in'
            : 'if you buy in India instead of the US · per 10g · all-in';
        }

        document.getElementById('us-per-10g').textContent = fmt$(v.us_usd_per_10g);
        document.getElementById('us-per-10g-inr').textContent = '≈ ' + fmtINR(v.us_inr_per_10g);
        document.getElementById('in-per-10g').textContent = fmtINR(v.india_inr_per_10g);
        document.getElementById('in-per-10g-usd').textContent = '≈ ' + fmt$(v.india_usd_per_10g);

        const inputs = data.inputs || {};
        const taxRate = v.us_sales_tax_rate || 0;
        const srcLabel = (inputs.us_source || '').toUpperCase();
        const taxLabel = taxRate > 0 ? ` · incl. ${(taxRate * 100).toFixed(2)}% tax` : ' · no bullion tax';
        document.getElementById('us-sub').textContent = srcLabel + taxLabel;
        document.getElementById('spot').textContent = fmt$(inputs.spot_usd_per_oz) + '/oz';
        document.getElementById('fx').textContent = '₹' + fmtNum(inputs.usd_inr, 2);
        document.getElementById('us-price').textContent = fmt$(inputs.us_price_usd);
        document.getElementById('us-grams').textContent = fmtNum(inputs.us_grams, 4) + ' g';
        document.getElementById('ts').textContent = relTime(data.timestamp);

        const link = document.getElementById('src-link');
        link.href = inputs.us_url || '#';
        link.textContent = 'view ' + (inputs.us_source || 'source') + ' page';

        if (inputs.us_notes) {
          const nb = document.getElementById('notes-banner');
          nb.style.display = 'block';
          nb.textContent = inputs.us_notes;
        }

        try {
          const hr = await fetch('history.json?_=' + Date.now());
          if (hr.ok) renderSpark(await hr.json());
        } catch (_) {}

        await loadCostco(inputs, v);
      } catch (e) {
        setStatus('error', e.message);
        const eb = document.getElementById('error-banner');
        eb.style.display = 'block';
        eb.textContent = 'Could not load data.json (' + e.message + '). First run may not be done yet.';
      }
    }

    load();
    setInterval(load, 60_000);
  </script>
</body>
</html>
